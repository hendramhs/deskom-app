name: Deploy to ECS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} \
          | docker login --username AWS --password-stdin 519025700650.dkr.ecr.ap-southeast-2.amazonaws.com

      - name: Build Docker image
        run: |
          docker build -t flask-deskom-app .

      - name: Tag image
        run: |
          docker tag flask-deskom-app:latest 519025700650.dkr.ecr.ap-southeast-2.amazonaws.com/flask-deskom-app:latest

      - name: Push image to ECR
        run: |
          docker push 519025700650.dkr.ecr.ap-southeast-2.amazonaws.com/flask-deskom-app:latest

      - name: Force new deployment
        run: |
          aws ecs update-service \
            --cluster ${{ secrets.ECS_CLUSTER }} \
            --service ${{ secrets.ECS_SERVICE }} \
            --force-new-deployment
