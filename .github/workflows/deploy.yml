name: Deploy to ECS

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    - name: Login to ECR
      run: |
        aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin 519025700650.dkr.ecr.ap-southeast-2.amazonaws.com

    - name: Build Docker image
      run: |
        docker build -t $ECR_REPOSITORY .

    - name: Tag image
      run: |
        docker tag $ECR_REPOSITORY:latest 519025700650.dkr.ecr.ap-southeast-2.amazonaws.com/$ECR_REPOSITORY:latest

    - name: Push image to ECR
      run: |
        docker push 519025700650.dkr.ecr.ap-southeast-2.amazonaws.com/$ECR_REPOSITORY:latest

    # =============================
    # REGISTER TASK DEFINITION BARU
    # =============================
    - name: Download current task definition
      run: |
        aws ecs describe-task-definition \
          --task-definition $ECS_TASK_DEFINITION \
          --query taskDefinition > task-definition.json

    - name: Update image in task definition
      run: |
        jq '.containerDefinitions[0].image = "519025700650.dkr.ecr.ap-southeast-2.amazonaws.com/'"$ECR_REPOSITORY"':latest"' task-definition.json > new-task-definition.json

    - name: Register new task definition
      run: |
        aws ecs register-task-definition \
          --cli-input-json file://new-task-definition.json

    # =============================
    # UPDATE SERVICE
    # =============================
    - name: Update ECS service
      run: |
        aws ecs update-service \
          --cluster $ECS_CLUSTER \
          --service $ECS_SERVICE \
          --force-new-deployment